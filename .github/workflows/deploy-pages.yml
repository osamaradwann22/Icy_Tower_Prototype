name: Deploy Web Game

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Download Godot
        run: |
          GODOT_VERSION="4.6.2"
          GODOT_STATUS="stable"
          curl -L --fail -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          unzip -q godot.zip
          chmod +x "Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64"

      - name: Install export templates
        run: |
          GODOT_VERSION="4.6.2"
          GODOT_STATUS="stable"
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "$TEMPLATES_DIR"
          curl -L --fail -o export_templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          unzip -q export_templates.tpz -d /tmp/godot_templates
          cp /tmp/godot_templates/templates/* "$TEMPLATES_DIR/"

      - name: Export Web
        run: |
          mkdir -p build/web
          ./Godot_v4.6.2-stable_linux.x86_64 --headless --path . --export-release Web build/web/index.html
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
